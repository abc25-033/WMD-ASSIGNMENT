<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Kingsman Suits | Tailored for the Throne</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="logo">
        <a href="index.html" aria-label="Kingsman Suits Home">KINGSMAN SUITS</a>
      </div>
      
      <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      
      <nav class="navbar" aria-label="Main navigation">
        <ul class="nav-list">
          <li><a href="index.html" class="active">Home</a></li>
          <li><a href="suits.html">Suits</a></li>
          <li><a href="about.html">About Us</a></li>
          <li><a href="feedback.html">Feedback</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </div>

  <main>
    <section class="hero">

      <div class="hero-content container">

      </div>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Kingsman Suits. All rights reserved. | Gaborone, Botswana</p>
    </div>
  </footer>
 
  <script>
    // Mobile nav toggle
    const toggle = document.querySelector('.nav-toggle');
    const nav = document.querySelector('.navbar');
    toggle.addEventListener('click', () => {
      const expanded = toggle.getAttribute('aria-expanded') === 'true';
      toggle.setAttribute('aria-expanded', !expanded);
      nav.classList.toggle('nav-open');
    });
  </script>
</body>
</html>
