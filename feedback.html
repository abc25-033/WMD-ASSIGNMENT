<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KINGSMAN - Feedback</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1><div class="logo"><a href="index.html">KINSMAN</a></div></h1>
    <nav class="navbar">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="suits.html">Suits</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="feedback.html">Feedback</a></li>
        <li><a href="contact.html">Contact Us</a></li>
      </ul>
    </nav>
  </header>
  <section class="feedback">
       <section class="hero">
      <div class="hero-image">
        <img src="images/WhatsApp Image 2026-04-13 at 19.48.05.jpeg" alt="Man in tailored Kingsman Suit">
      </div>
      <div class="hero-content container">
    <h2>Feedback</h2>
    <p>Suits are personal.Tell us how we did so we can improve our service.</p>
    <form action="submit_feedback.html" method="post">
      <label for="firstname">Firstname:</label>
      <input type="text" id="firstname" name="firstname" required placeholder="Firstname"/><br><br>
      <label for="lastname">Lastname:</label>
      <input type="text" id="lastname" name="lastname" required placeholder="Last Name"/><br><br>
      <label for="gender">Gender:</label>
      <select id="gender" onchange="alert(this.value)" name="gender" required>
        <!--<option value="">Select Gender</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
        <option value="other">Other</option>-->
        <option value="0">Select... </option>
        <option value="F">Female</option>
        <option value="M">Male</option>
      </select><br><br>  
      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required placeholder="Email"><br><br>
      <label for="Rating">Rate Your Experience</label>
      <div class="rating-group">
      <input type="radio" id="star5" name="rating" value="5" required>
        <label for="star5">5-Exceptional</label>
       <input type="radio" id="star4" name="rating" value="4" required>
        <label for="star4">4-Great</label>
       <input type="radio" id="star3" name="rating" value="3" required>
        <label for="star3">3-Good</label>
       <input type="radio" id="star2" name="rating" value="2" required>
        <label for="star2">2-Fair</label>
       <input type="radio" id="star1" name="rating" value="1" required>
        <label for="star1">1-poor</label>
      
     <button type="submit">Submit Feedback</button>
    </form>
  </section>
  <footer class="foot">
    <p>&copy; 2026 KINGSMAN. All rights reserved.</p>
  </footer>
</body>
</html>
