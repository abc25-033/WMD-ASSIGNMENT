<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="style.css">

<body>
  <header>
    <h1><div class="logo"><a href="index.html">KINSMAN</a></div></h1>
    <nav class="navbar">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="suits.html">Suits</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="feedback.html">Feedback</a></li>
        <li><a href="contact.html">Contact Us</a></li>
      </ul>
    </nav>
  </header>
  <section class="feedback">
    <h2>Feedback</h2>
    <p>We value your input! Please share your thoughts, suggestions, or any concerns you may have about our services or website.</p>
    <form action="submit_feedback.html" method="post">
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" required><br><br>

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required><br><br>

      <label for="message">Message:</label>
      <textarea id="message" name="message" rows="5" required></textarea><br><br>

      <button type="submit">Submit Feedback</button>
    </form>
  </section>
  <footer class="foot">

  </footer>
